<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✨ Chromatic Piano</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:radial-gradient(ellipse at 30% 30%,#1a0040 0%,#000010 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
  padding:20px 10px;
}
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:twinkle var(--d) infinite ease-in-out var(--delay)}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.9}}
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
  pointer-events:none;z-index:200;
}
.header{position:relative;z-index:10;text-align:center;margin-bottom:22px}
.header h1{
  font-family:'Orbitron',monospace;font-size:clamp(1.3rem,4vw,2.6rem);font-weight:900;
  background:linear-gradient(90deg,#ff2dff,#00e5ff,#ffe600,#ff2dff);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:hueShift 4s linear infinite;letter-spacing:0.15em;
}
@keyframes hueShift{0%{background-position:0%}100%{background-position:300%}}
.header p{color:rgba(180,160,255,0.45);font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;margin-top:6px}
.note-hud{position:relative;z-index:10;margin-bottom:14px;min-height:42px;display:flex;align-items:center;justify-content:center}
.note-pill{
  padding:5px 24px;border-radius:40px;font-family:'Orbitron',monospace;
  font-size:1rem;font-weight:700;border:2px solid transparent;background:rgba(0,0,0,0.4);
  color:#fff;opacity:0;transition:opacity 0.1s;
}
.note-pill.visible{opacity:1;animation:popIn 0.2s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0.6) translateY(6px)}100%{transform:scale(1) translateY(0)}}
.piano-wrap{
  position:relative;z-index:10;
  background:linear-gradient(170deg,#110820 0%,#05010f 100%);
  border:1px solid rgba(180,100,255,0.2);border-radius:14px 14px 22px 22px;
  padding:20px 20px 32px;
  box-shadow:0 0 60px rgba(120,0,255,0.15),0 30px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(200,100,255,0.15);
}
.top-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.top-bar .gl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(160,80,255,0.4))}
.top-bar .gl:last-child{background:linear-gradient(270deg,transparent,rgba(160,80,255,0.4))}
.top-bar span{font-size:0.6rem;letter-spacing:0.45em;color:rgba(180,120,255,0.35);text-transform:uppercase}
.piano{display:flex;position:relative;user-select:none}
.key{
  position:relative;width:44px;height:180px;
  background:linear-gradient(180deg,#f0ecff 0%,#e2daf5 55%,#ccc4e8 100%);
  border:1px solid rgba(100,60,200,0.25);border-radius:0 0 8px 8px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:10px;
  transition:transform 0.06s,background 0.06s,box-shadow 0.06s;
  box-shadow:inset 0 -4px 8px rgba(0,0,0,0.1),0 6px 12px rgba(0,0,0,0.35),2px 0 0 rgba(0,0,0,0.07);
  z-index:1;overflow:hidden;
}
.key:not(:first-child){border-left:none}
.key .nn{font-family:'Rajdhani',sans-serif;font-size:0.55rem;font-weight:600;color:rgba(80,40,150,0.45);margin-bottom:2px;transition:color 0.06s}
.key .kb{font-family:'Orbitron',monospace;font-size:0.62rem;font-weight:700;color:rgba(60,20,120,0.5);transition:color 0.06s}
.key.active{transform:translateY(4px) scaleY(0.98);box-shadow:inset 0 2px 6px rgba(0,0,0,0.25),0 2px 4px rgba(0,0,0,0.4)}
.key.active .kb,.key.active .nn{color:rgba(255,255,255,0.85)}
.key.black{
  position:absolute;width:28px;height:112px;
  background:linear-gradient(180deg,#1e1030 0%,#0f0820 70%,#050310 100%);
  border:1px solid rgba(60,20,100,0.8);border-radius:0 0 5px 5px;
  z-index:2;top:0;padding-bottom:8px;
  box-shadow:0 8px 16px rgba(0,0,0,0.7),inset 0 -2px 4px rgba(255,255,255,0.03),2px 0 0 rgba(0,0,0,0.5);
}
.key.black .nn{color:rgba(180,120,255,0.35);font-size:0.48rem}
.key.black .kb{color:rgba(160,100,255,0.4);font-size:0.5rem}
.key.black.active{transform:translateY(2px);box-shadow:0 4px 8px rgba(0,0,0,0.6),inset 0 2px 4px rgba(0,0,0,0.4)}
.key.black.active .kb,.key.black.active .nn{color:rgba(255,255,255,0.9)}
#fxCanvas{position:fixed;inset:0;pointer-events:none;z-index:100}
.hint{position:relative;z-index:10;margin-top:16px;text-align:center;color:rgba(150,100,255,0.3);font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;line-height:1.8}
</style>
</head>
<body>
<canvas id="fxCanvas"></canvas>
<div class="stars" id="stars"></div>

<div class="header">
  <h1>✦ Lalit Ka Piano Badhiya wala ✦</h1>
  <p>All 26 keys · Press &amp; watch the magic</p>
</div>

<div class="note-hud"><div class="note-pill" id="notePill">—</div></div>

<div class="piano-wrap">
  <div class="top-bar">
    <div class="gl"></div><span>Synth Grand</span><div class="gl"></div>
  </div>
  <div class="piano" id="piano"></div>
</div>

<div class="hint">
  White keys: A S D F G H J K L &nbsp;·&nbsp; Z X C V B N M<br>
  Black keys: Q W E R T Y U I O P
</div>

<script>
/* ── Stars ── */
(()=>{
  const c=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${-Math.random()*4}s;opacity:${0.1+Math.random()*0.5}`;
    c.appendChild(s);
  }
})();

/* ── Piano Data ── */
// 16 white keys: A S D F G H J K L  Z X C V B N M
// 10 black keys: Q W E R T Y U I O P
const WHITE_LETTERS=['A','S','D','F','G','H','J','K','L','Z','X','C','V','B','N','M'];
const WHITE_NOTES=[
  {note:'C4',freq:261.63},{note:'D4',freq:293.66},{note:'E4',freq:329.63},
  {note:'F4',freq:349.23},{note:'G4',freq:392.00},{note:'A4',freq:440.00},
  {note:'B4',freq:493.88},{note:'C5',freq:523.25},{note:'D5',freq:587.33},
  {note:'E5',freq:659.25},{note:'F5',freq:698.46},{note:'G5',freq:783.99},
  {note:'A5',freq:880.00},{note:'B5',freq:987.77},{note:'C6',freq:1046.50},
  {note:'D6',freq:1174.66}
];
// Black key positions: after which white key index (0-based)
const BLACK_DEFS=[
  {letter:'Q',note:'C#4',freq:277.18,after:0},
  {letter:'W',note:'D#4',freq:311.13,after:1},
  {letter:'E',note:'F#4',freq:369.99,after:3},
  {letter:'R',note:'G#4',freq:415.30,after:4},
  {letter:'T',note:'A#4',freq:466.16,after:5},
  {letter:'Y',note:'D#5',freq:622.25,after:9},
  {letter:'U',note:'F#5',freq:739.99,after:10},
  {letter:'I',note:'G#5',freq:830.61,after:12},
  {letter:'O',note:'A#5',freq:932.33,after:13},
  {letter:'P',note:'C#6',freq:1108.73,after:14},
];

const KEY_COLORS={
  A:'#ff2dff',S:'#d500f9',D:'#7c4dff',F:'#00b0ff',G:'#00e5ff',
  H:'#00ff9f',J:'#76ff03',K:'#ffe600',L:'#ff9100',Z:'#ff3d00',
  X:'#ff1744',C:'#f50057',V:'#e040fb',B:'#40c4ff',N:'#18ffff',
  M:'#69ff47',
  Q:'#ff6ec7',W:'#ff9cee',E:'#b388ff',R:'#82b1ff',T:'#80d8ff',
  Y:'#a7ffeb',U:'#ccff90',I:'#ffd180',O:'#ff9e80',P:'#ea80fc'
};

/* ── Build DOM ── */
const pianoEl=document.getElementById('piano');
const keyMap={};
const WW=44; // white key width

WHITE_LETTERS.forEach((letter,i)=>{
  const {note,freq}=WHITE_NOTES[i];
  const el=document.createElement('div');
  el.className='key white';el.dataset.key=letter;
  el.innerHTML=`<span class="nn">${note}</span><span class="kb">${letter}</span>`;
  pianoEl.appendChild(el);
  keyMap[letter]={el,freq,note,color:KEY_COLORS[letter]};
});

BLACK_DEFS.forEach(({letter,note,freq,after})=>{
  const el=document.createElement('div');
  el.className='key black';el.dataset.key=letter;
  el.innerHTML=`<span class="nn">${note}</span><span class="kb">${letter}</span>`;
  el.style.left=(after*WW+WW-14)+'px';
  pianoEl.appendChild(el);
  keyMap[letter]={el,freq,note,color:KEY_COLORS[letter]};
});

/* ── Audio ── */
let audioCtx=null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playNote(freq){
  const ctx=getCtx(),now=ctx.currentTime;
  const layers=[{t:'triangle',m:1,v:0.44},{t:'sine',m:2,v:0.17},{t:'sine',m:3,v:0.07},{t:'sine',m:0.5,v:0.05}];
  const master=ctx.createGain();master.gain.value=0.7;
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.ratio.value=5;
  master.connect(comp);comp.connect(ctx.destination);
  layers.forEach(({t,m,v})=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=t;o.frequency.value=freq*m;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(v,now+0.006);
    g.gain.exponentialRampToValueAtTime(v*0.4,now+0.15);
    g.gain.exponentialRampToValueAtTime(0.001,now+1.6);
    o.connect(g);g.connect(master);
    o.start(now);o.stop(now+1.8);
  });
}

/* ── Canvas FX ── */
const canvas=document.getElementById('fxCanvas');
const c2=canvas.getContext('2d');
let CW,CH;
function resize(){CW=canvas.width=window.innerWidth;CH=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

const parts=[];

class P{
  constructor(x,y,color,type){
    this.x=x;this.y=y;this.color=color;this.type=type;
    this.alpha=1;this.dead=false;
    if(type==='glitter'){
      const a=Math.random()*Math.PI*2,sp=2+Math.random()*7;
      this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-2;
      this.g=0.2;this.sz=2+Math.random()*5;
      this.rot=Math.random()*Math.PI*2;this.rs=(Math.random()-.5)*0.35;
      this.shape=Math.random()<0.5?'star':'diamond';
      this.life=0.9+Math.random()*0.7;this.dec=0.014+Math.random()*0.01;
    }
    if(type==='rain'){
      this.vx=(Math.random()-.5)*2;
      this.vy=-(9+Math.random()*13);
      this.g=0.55;this.sz=1.5+Math.random()*3;
      this.life=1;this.dec=0.009+Math.random()*0.009;
      this.trail=[];
    }
    if(type==='firework'){
      const a=Math.random()*Math.PI*2,sp=3+Math.random()*10;
      this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
      this.g=0.13;this.sz=1.5+Math.random()*3;
      this.life=1;this.dec=0.013+Math.random()*0.01;
      this.trail=[{x,y}];
    }
    if(type==='spark'){
      const a=-Math.PI/2+(Math.random()-.5)*Math.PI*0.9,sp=6+Math.random()*13;
      this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
      this.g=0.45;this.sz=1.5+Math.random()*2.5;
      this.life=1;this.dec=0.022+Math.random()*0.015;
      this.len=5+Math.random()*10;
    }
    if(type==='ring'){
      this.r=0;this.maxR=80+Math.random()*60;
      this.life=1;this.dec=0.03;this.sz=2+Math.random()*2;
    }
  }
  update(){
    if(this.trail) this.trail.push({x:this.x,y:this.y}),this.trail.length>9&&this.trail.shift();
    if(this.type!=='ring'){this.x+=this.vx;this.y+=this.vy;if(this.g)this.vy+=this.g;}
    if(this.type==='glitter') this.rot+=this.rs;
    if(this.type==='ring') this.r+=4;
    this.life-=this.dec;
    this.alpha=Math.max(0,this.life);
    if(this.life<=0) this.dead=true;
  }
  draw(ctx){
    ctx.save();ctx.globalAlpha=this.alpha;
    if(this.type==='glitter'){
      ctx.translate(this.x,this.y);ctx.rotate(this.rot);
      ctx.fillStyle=this.color;ctx.shadowBlur=10;ctx.shadowColor=this.color;
      if(this.shape==='star'){star(ctx,0,0,this.sz*.4,this.sz,4);ctx.fill();}
      else{ctx.beginPath();ctx.moveTo(0,-this.sz);ctx.lineTo(this.sz*.5,0);ctx.lineTo(0,this.sz);ctx.lineTo(-this.sz*.5,0);ctx.closePath();ctx.fill();}
    }
    if(this.type==='rain'){
      if(this.trail.length>1){
        ctx.beginPath();ctx.moveTo(this.trail[0].x,this.trail[0].y);
        for(let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x,this.trail[i].y);
        ctx.lineTo(this.x,this.y);
        ctx.strokeStyle=this.color;ctx.lineWidth=this.sz*.6;ctx.lineCap='round';
        ctx.shadowBlur=8;ctx.shadowColor=this.color;ctx.stroke();
      }
      ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);
      ctx.fillStyle=this.color;ctx.shadowBlur=14;ctx.shadowColor=this.color;ctx.fill();
    }
    if(this.type==='firework'){
      if(this.trail.length>1){
        ctx.beginPath();ctx.moveTo(this.trail[0].x,this.trail[0].y);
        for(let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x,this.trail[i].y);
        ctx.lineTo(this.x,this.y);
        ctx.strokeStyle=this.color;ctx.lineWidth=this.sz*.4;ctx.globalAlpha=this.alpha*.35;ctx.stroke();
        ctx.globalAlpha=this.alpha;
      }
      ctx.beginPath();ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);
      ctx.fillStyle=this.color;ctx.shadowBlur=16;ctx.shadowColor=this.color;ctx.fill();
    }
    if(this.type==='spark'){
      const mag=Math.hypot(this.vx,this.vy)||1;
      const ex=this.x-this.vx/mag*this.len,ey=this.y-this.vy/mag*this.len;
      ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(ex,ey);
      ctx.strokeStyle=this.color;ctx.lineWidth=this.sz;ctx.lineCap='round';
      ctx.shadowBlur=12;ctx.shadowColor=this.color;ctx.stroke();
    }
    if(this.type==='ring'){
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.strokeStyle=this.color;ctx.lineWidth=this.sz;
      ctx.shadowBlur=20;ctx.shadowColor=this.color;ctx.stroke();
    }
    ctx.restore();
  }
}

function star(ctx,cx,cy,r1,r2,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2===0?r2:r1,a=(i/pts)*Math.PI-Math.PI/2;
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();
}

function shade(hex){
  const v=[hex,'#ffffff',lighten(hex,.5),'#ffff99','#ffffff','#ffaaff'];
  return v[Math.floor(Math.random()*v.length)];
}
function lighten(hex,a){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`#${Math.min(255,r+Math.round(a*255)).toString(16).padStart(2,'0')}${Math.min(255,g+Math.round(a*255)).toString(16).padStart(2,'0')}${Math.min(255,b+Math.round(a*255)).toString(16).padStart(2,'0')}`;
}

function spawnFX(el,color){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height*.35;
  for(let i=0;i<30;i++) parts.push(new P(cx,cy,shade(color),'glitter'));
  for(let i=0;i<16;i++) parts.push(new P(cx,cy,shade(color),'spark'));
  for(let i=0;i<22;i++) parts.push(new P(cx+(Math.random()-.5)*90,cy,shade(color),'rain'));
  for(let i=0;i<22;i++) parts.push(new P(cx,cy,shade(color),'firework'));
  for(let i=0;i<3;i++) parts.push(new P(cx,cy,color,'ring'));
}

/* ── Key glow ── */
function glow(el,color,on){
  if(on){
    el.style.background=el.classList.contains('black')
      ?`linear-gradient(180deg,${color}99 0%,${color}55 60%,#050310 100%)`
      :`linear-gradient(180deg,${color}dd 0%,${color}aa 50%,${color}66 100%)`;
    el.style.boxShadow=`0 0 22px ${color},0 0 44px ${color}77,inset 0 0 14px ${color}55`;
    el.querySelector('.kb').style.color='rgba(255,255,255,0.9)';
    el.querySelector('.nn').style.color='rgba(255,255,255,0.7)';
  } else {
    el.style.background='';el.style.boxShadow='';
    el.querySelector('.kb').style.color='';el.querySelector('.nn').style.color='';
  }
}

/* ── Note pill ── */
const pill=document.getElementById('notePill');
let pt;
function showNote(note,color){
  pill.textContent=note;pill.style.color=color;pill.style.borderColor=color;
  pill.style.boxShadow=`0 0 22px ${color},0 0 44px ${color}66`;
  pill.classList.remove('visible');void pill.offsetWidth;pill.classList.add('visible');
  clearTimeout(pt);pt=setTimeout(()=>pill.classList.remove('visible'),850);
}

/* ── Trigger/Release ── */
const active=new Set();
function trigger(letter){
  const e=keyMap[letter];if(!e||active.has(letter))return;
  active.add(letter);
  const{el,freq,note,color}=e;
  el.classList.add('active');glow(el,color,true);
  playNote(freq);showNote(note,color);spawnFX(el,color);
}
function release(letter){
  const e=keyMap[letter];if(!e)return;
  active.delete(letter);e.el.classList.remove('active');glow(e.el,e.color,false);
}

document.addEventListener('keydown',e=>{if(!e.repeat)trigger(e.key.toUpperCase())});
document.addEventListener('keyup',e=>release(e.key.toUpperCase()));

Object.values(keyMap).forEach(({el})=>{
  const l=el.dataset.key;
  el.addEventListener('mousedown',e=>{e.preventDefault();trigger(l)});
  el.addEventListener('mouseup',()=>release(l));
  el.addEventListener('mouseleave',()=>release(l));
  el.addEventListener('touchstart',e=>{e.preventDefault();trigger(l)},{passive:false});
  el.addEventListener('touchend',()=>release(l));
});

/* ── Loop ── */
function loop(){
  c2.clearRect(0,0,CW,CH);
  for(let i=parts.length-1;i>=0;i--){
    parts[i].update();parts[i].draw(c2);
    if(parts[i].dead) parts.splice(i,1);
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
