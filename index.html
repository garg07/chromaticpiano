<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🎹 Neon Piano</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  width:100%;height:100%;
  background:#05050f;
  font-family:'Orbitron',monospace;
  overflow:hidden;
  touch-action:none;
}

/* ── CANVASES ── */
#bgCanvas,#fxCanvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;
}
#bgCanvas{z-index:0;}
#fxCanvas{z-index:30;}

/* ── LAYOUT ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;
  padding:12px 8px;
  gap:10px;
}

/* ── TITLE ── */
#title{
  font-size:clamp(1.1rem,5vw,2.4rem);
  font-weight:900;
  background:linear-gradient(90deg,#ff6ef7,#6ef9ff,#ffe56e,#6effa0,#ff6ef7);
  background-size:400% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gs 4s linear infinite;
  letter-spacing:0.1em;
  filter:drop-shadow(0 0 14px rgba(110,249,255,0.5));
  white-space:nowrap;
  flex-shrink:0;
}
@keyframes gs{0%{background-position:0%}100%{background-position:400%}}

/* ── NOTE BADGE ── */
#badge{
  font-size:clamp(0.85rem,3.5vw,1.3rem);
  font-weight:700;
  letter-spacing:0.12em;
  padding:5px 22px;
  border-radius:40px;
  border:2px solid transparent;
  color:#fff;
  opacity:0;
  transition:opacity 0.1s;
  flex-shrink:0;
  white-space:nowrap;
}
#badge.show{opacity:1;animation:pop 0.3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(0.6) translateY(6px);opacity:0;}100%{transform:scale(1);opacity:1;}}

/* ── PIANO SHELL ── */
#shell{
  position:relative;
  background:linear-gradient(160deg,#0d0d22,#060610);
  border-radius:14px 14px 20px 20px;
  padding:14px 14px 20px;
  flex-shrink:0;
  /* shell width will match piano width dynamically */
}
#shell::before{
  content:'';position:absolute;inset:-1px;
  border-radius:14px 14px 20px 20px;
  background:linear-gradient(90deg,#ff6ef7,#6ef9ff,#ffe56e,#6effa0,#ff6ef7);
  background-size:400% 100%;animation:gs 5s linear infinite;
  opacity:0.22;z-index:-1;filter:blur(3px);
}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.topbar .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(110,249,255,0.25));}
.topbar .ln:last-child{background:linear-gradient(270deg,transparent,rgba(110,249,255,0.25));}
.topbar span{font-size:0.52rem;letter-spacing:0.45em;color:rgba(110,249,255,0.3);text-transform:uppercase;white-space:nowrap;}

/* ── PIANO KEYS CONTAINER ── */
#pianoScroll{
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  /* hide scrollbar but allow scrolling */
  scrollbar-width:none;
}
#pianoScroll::-webkit-scrollbar{display:none;}

#piano{
  display:flex;
  position:relative;
  user-select:none;
  /* height = white key height; will be set by JS */
}

/* ── KEYS ── (sizes set via CSS vars, overridden by JS on small screens) */
.key{
  position:relative;
  width:var(--ww,42px);
  height:var(--wh,170px);
  background:linear-gradient(180deg,#eeeeff,#d8d8f0 55%,#c0c0e0);
  border:1px solid rgba(100,60,200,0.3);
  border-radius:0 0 7px 7px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:8px;
  transition:transform 0.05s,box-shadow 0.05s,background 0.05s;
  box-shadow:inset 0 -4px 8px rgba(0,0,0,0.1),0 6px 12px rgba(0,0,0,0.4),2px 0 0 rgba(0,0,0,0.07);
  z-index:1;
  flex-shrink:0;
}
.key:not(:first-child){border-left:none;}
.key .nn{font-size:var(--nf,0.42rem);color:rgba(60,30,140,0.4);margin-bottom:1px;letter-spacing:0.02em;}
.key .kb{font-size:var(--kf,0.62rem);font-weight:700;color:rgba(40,20,110,0.5);}
.key.active{transform:translateY(4px);box-shadow:inset 0 2px 5px rgba(0,0,0,0.25),0 2px 4px rgba(0,0,0,0.4);}
.key.active .kb,.key.active .nn{color:rgba(10,5,30,0.9);}

.key.black{
  position:absolute;
  width:var(--bw,26px);
  height:var(--bh,108px);
  background:linear-gradient(180deg,#1a1030,#0d0820 70%,#06040f);
  border:1px solid #040210;
  border-radius:0 0 5px 5px;
  z-index:2;top:0;
  padding-bottom:7px;
  box-shadow:0 8px 18px rgba(0,0,0,0.75),inset 0 -2px 4px rgba(255,255,255,0.03),3px 3px 0 rgba(0,0,0,0.5);
}
.key.black .nn{color:rgba(150,100,255,0.3);font-size:var(--bnf,0.38rem);}
.key.black .kb{color:rgba(140,90,255,0.42);font-size:var(--bkf,0.52rem);}
.key.black.active{transform:translateY(2px);box-shadow:inset 0 2px 5px rgba(0,0,0,0.5),0 4px 8px rgba(0,0,0,0.5);}

/* ── HINT ── */
#hint{
  font-size:clamp(0.45rem,2vw,0.6rem);
  letter-spacing:0.2em;
  color:rgba(150,170,255,0.2);
  text-transform:uppercase;
  text-align:center;
  line-height:1.9;
  flex-shrink:0;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<div id="app">
  <div id="title">✦ QWERTY PIANO ✦</div>
  <div id="badge">—</div>
  <div id="shell">
    <div class="topbar">
      <div class="ln"></div><span>Chromatic Grand</span><div class="ln"></div>
    </div>
    <div id="pianoScroll">
      <div id="piano"></div>
    </div>
  </div>
  <div id="hint">
    White: A S D F G H J K L Z X C V B N M<br>
    Black: Q W E R T Y U I O P
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════
const WHITE_KEYS=[
  {k:'A',n:'C4', f:261.63},{k:'S',n:'D4', f:293.66},{k:'D',n:'E4', f:329.63},
  {k:'F',n:'F4', f:349.23},{k:'G',n:'G4', f:392.00},{k:'H',n:'A4', f:440.00},
  {k:'J',n:'B4', f:493.88},{k:'K',n:'C5', f:523.25},{k:'L',n:'D5', f:587.33},
  {k:'Z',n:'E5', f:659.25},{k:'X',n:'F5', f:698.46},{k:'C',n:'G5', f:783.99},
  {k:'V',n:'A5', f:880.00},{k:'B',n:'B5', f:987.77},{k:'N',n:'C6', f:1046.50},
  {k:'M',n:'D6', f:1174.66},
];
const BLACK_KEYS=[
  {k:'Q',n:'C#4',f:277.18,a:0},{k:'W',n:'D#4',f:311.13,a:1},
  {k:'E',n:'F#4',f:369.99,a:3},{k:'R',n:'G#4',f:415.30,a:4},
  {k:'T',n:'A#4',f:466.16,a:5},{k:'Y',n:'D#5',f:622.25,a:9},
  {k:'U',n:'F#5',f:739.99,a:10},{k:'I',n:'G#5',f:830.61,a:12},
  {k:'O',n:'A#5',f:932.33,a:13},{k:'P',n:'C#6',f:1108.73,a:14},
];
const COLORS={
  A:'#ff2dff',S:'#d500f9',D:'#7c4dff',F:'#00b0ff',G:'#00e5ff',
  H:'#00ff9f',J:'#76ff03',K:'#ffe600',L:'#ff9100',Z:'#ff3d00',
  X:'#ff1744',C:'#f50057',V:'#e040fb',B:'#40c4ff',N:'#18ffff',M:'#69ff47',
  Q:'#ff6ec7',W:'#ff9cee',E:'#b388ff',R:'#82b1ff',T:'#80d8ff',
  Y:'#a7ffeb',U:'#ccff90',I:'#ffd180',O:'#ff9e80',P:'#ea80fc',
};

// ══════════════════════════════════════════════════════
//  RESPONSIVE SIZING
//  Fit all 16 white keys within the visible screen width
// ══════════════════════════════════════════════════════
function calcSizes(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const availW = vw - 28;          // shell padding 14px each side
  const maxWW = 48;
  const minWW = 22;
  let ww = Math.floor(availW / 16);
  ww = Math.max(minWW, Math.min(maxWW, ww));

  // Key heights — proportional to width
  const wh = Math.round(ww * 4.0);
  const bw = Math.round(ww * 0.60);
  const bh = Math.round(wh * 0.62);

  // Font sizes
  const kf = Math.max(0.38, Math.min(0.7, ww * 0.016)) + 'rem';
  const nf = Math.max(0.32, Math.min(0.52, ww * 0.012)) + 'rem';

  return {ww, wh, bw, bh, kf, nf};
}

function applySizes(sz){
  const r = document.documentElement.style;
  r.setProperty('--ww', sz.ww+'px');
  r.setProperty('--wh', sz.wh+'px');
  r.setProperty('--bw', sz.bw+'px');
  r.setProperty('--bh', sz.bh+'px');
  r.setProperty('--kf',  sz.kf);
  r.setProperty('--nf',  sz.nf);
  r.setProperty('--bkf', sz.kf);
  r.setProperty('--bnf', sz.nf);
  return sz;
}

// ══════════════════════════════════════════════════════
//  BUILD PIANO DOM
// ══════════════════════════════════════════════════════
const pianoEl = document.getElementById('piano');
const keyMap  = {};

function buildPiano(sz){
  pianoEl.innerHTML = '';
  pianoEl.style.height = sz.wh + 'px';
  pianoEl.style.width  = (sz.ww * WHITE_KEYS.length) + 'px';

  WHITE_KEYS.forEach(({k,n,f})=>{
    const el = document.createElement('div');
    el.className = 'key white';
    el.dataset.key = k;
    el.innerHTML = `<span class="nn">${n}</span><span class="kb">${k}</span>`;
    pianoEl.appendChild(el);
    keyMap[k] = {el, f, n, c:COLORS[k], type:'white'};
  });

  BLACK_KEYS.forEach(({k,n,f,a})=>{
    const el = document.createElement('div');
    el.className = 'key black';
    el.dataset.key = k;
    el.innerHTML = `<span class="nn">${n}</span><span class="kb">${k}</span>`;
    el.style.left = (a * sz.ww + sz.ww - sz.bw/2) + 'px';
    pianoEl.appendChild(el);
    keyMap[k] = {el, f, n, c:COLORS[k], type:'black'};
  });

  // Attach touch/mouse events
  Object.entries(keyMap).forEach(([lt,{el}])=>{
    el.addEventListener('mousedown',  e=>{e.preventDefault();trigger(lt);});
    el.addEventListener('mouseup',    ()=>release(lt));
    el.addEventListener('mouseleave', ()=>release(lt));
    el.addEventListener('touchstart', e=>{e.preventDefault();trigger(lt);},{passive:false});
    el.addEventListener('touchend',   e=>{e.preventDefault();release(lt);},{passive:false});
    el.addEventListener('touchcancel',()=>release(lt));
  });
}

let SZ = applySizes(calcSizes());
buildPiano(SZ);

window.addEventListener('resize', ()=>{
  SZ = applySizes(calcSizes());
  buildPiano(SZ);
  resizeCanvases();
});

// ══════════════════════════════════════════════════════
//  BACKGROUND STARFIELD
// ══════════════════════════════════════════════════════
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
let stars = [];

function resizeCanvases(){
  bgC.width  = fxC.width  = window.innerWidth;
  bgC.height = fxC.height = window.innerHeight;
  initStars();
}

function initStars(){
  stars = Array.from({length:120}, ()=>({
    x: Math.random()*bgC.width,
    y: Math.random()*bgC.height,
    r: Math.random()*1.3+0.2,
    phase: Math.random()*Math.PI*2,
    speed: Math.random()*0.012+0.004,
    col: ['#6ef9ff','#ff6ef7','#ffe56e','#6effa0','#ffffff'][0|Math.random()*5]
  }));
}

function drawBg(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  stars.forEach(s=>{
    s.phase += s.speed;
    const a = (Math.sin(s.phase)*0.5+0.5)*0.75;
    bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle = s.col + Math.round(a*255).toString(16).padStart(2,'0');
    bgX.fill();
  });
  requestAnimationFrame(drawBg);
}
resizeCanvases();
drawBg();

// ══════════════════════════════════════════════════════
//  FX CANVAS — glitter + letter rain
// ══════════════════════════════════════════════════════
const fxC = document.getElementById('fxCanvas');
const fxX = fxC.getContext('2d');
let parts = [];

function spawnFX(x, y, color, letter){
  // 50 glitter particles
  for(let i=0;i<50;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*8;
    parts.push({
      t:'g', x, y,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2.5,
      gv:0.2, alpha:1, dec:0.013+Math.random()*0.018,
      color, r:2+Math.random()*5,
      star:Math.random()>0.4,
      rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*0.3
    });
  }
  // 14 letter rain drops
  for(let i=0;i<14;i++){
    parts.push({
      t:'lr', letter,
      x: x+(Math.random()-.5)*130,
      y: y,
      vy: -(4+Math.random()*8),
      gv: 0.28, alpha:1,
      dec: 0.01+Math.random()*0.013,
      color, sz: 11+Math.random()*22,
      drift:(Math.random()-.5)*1.6
    });
  }
  // 6 exploding letters radial
  for(let i=0;i<6;i++){
    const a=(Math.PI*2/6)*i, d=40+Math.random()*65;
    parts.push({
      t:'el', letter, x, y,
      tx:x+Math.cos(a)*d, ty:y+Math.sin(a)*d,
      prog:0, spd:0.04+Math.random()*0.03,
      alpha:1, dec:0.024, color, sz:16+Math.random()*16
    });
  }
  // 2 ripple rings
  parts.push({t:'rip',x,y,r:0,spd:7,alpha:0.8,dec:0.024,color,lw:2.5});
  parts.push({t:'rip',x,y,r:0,spd:12,alpha:0.5,dec:0.05,color:'#fff',lw:2});
  // Subtle screen flash
  parts.push({t:'fl',alpha:0.14,dec:0.07,color});
}

function drawStarShape(ctx,x,y,r,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(i*4*Math.PI/5)-Math.PI/2, ia=(i*4*Math.PI/5+Math.PI*2/5)-Math.PI/2;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    ctx.lineTo(Math.cos(ia)*r*.4,Math.sin(ia)*r*.4);
  }
  ctx.closePath();ctx.restore();
}

function animFX(){
  fxX.clearRect(0,0,fxC.width,fxC.height);
  parts = parts.filter(p=>p.alpha>0.01);

  parts.forEach(p=>{
    fxX.save();
    fxX.globalAlpha = Math.max(0,p.alpha);

    if(p.t==='g'){
      p.vx*=0.97; p.vy+=p.gv; p.x+=p.vx; p.y+=p.vy;
      p.rot+=p.rs; p.alpha-=p.dec;
      // glow halo
      const grd=fxX.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
      grd.addColorStop(0,p.color+'bb');grd.addColorStop(1,p.color+'00');
      fxX.fillStyle=grd;fxX.beginPath();fxX.arc(p.x,p.y,p.r*4,0,Math.PI*2);fxX.fill();
      fxX.fillStyle=p.color;fxX.shadowColor=p.color;fxX.shadowBlur=9;
      if(p.star){drawStarShape(fxX,p.x,p.y,p.r,p.rot);fxX.fill();}
      else{fxX.beginPath();fxX.arc(p.x,p.y,p.r,0,Math.PI*2);fxX.fill();}
    }

    else if(p.t==='lr'){
      p.vy+=p.gv; p.x+=p.drift; p.y+=p.vy; p.alpha-=p.dec;
      fxX.font=`900 ${p.sz}px Orbitron,monospace`;
      fxX.fillStyle=p.color;fxX.shadowColor=p.color;fxX.shadowBlur=13;
      fxX.textAlign='center';fxX.textBaseline='middle';
      fxX.fillText(p.letter,p.x,p.y);
    }

    else if(p.t==='el'){
      p.prog+=p.spd; if(p.prog>=1){p.alpha=0;fxX.restore();return;}
      const e=1-Math.pow(1-p.prog,3);
      const cx=p.x+(p.tx-p.x)*e, cy=p.y+(p.ty-p.y)*e;
      p.alpha=Math.max(0,1-p.prog*1.6);
      fxX.font=`900 ${p.sz}px Orbitron,monospace`;
      fxX.fillStyle=p.color;fxX.shadowColor=p.color;fxX.shadowBlur=20;
      fxX.textAlign='center';fxX.textBaseline='middle';fxX.fillText(p.letter,cx,cy);
    }

    else if(p.t==='rip'){
      p.r+=p.spd; p.alpha-=p.dec;
      fxX.beginPath();fxX.arc(p.x,p.y,p.r,0,Math.PI*2);
      fxX.strokeStyle=p.color;fxX.lineWidth=p.lw;
      fxX.shadowColor=p.color;fxX.shadowBlur=16;fxX.stroke();
    }

    else if(p.t==='fl'){
      p.alpha-=p.dec;
      fxX.fillStyle=p.color;fxX.fillRect(0,0,fxC.width,fxC.height);
    }

    fxX.restore();
  });
  requestAnimationFrame(animFX);
}
animFX();

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
let actx = null;
function getACtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function playNote(freq){
  const ctx=getACtx(), now=ctx.currentTime;
  const o1=ctx.createOscillator(),o2=ctx.createOscillator(),o3=ctx.createOscillator();
  o1.type='triangle';o2.type='sine';o3.type='sine';
  o1.frequency.setValueAtTime(freq,now);
  o2.frequency.setValueAtTime(freq*2,now);
  o3.frequency.setValueAtTime(freq*3.01,now);
  const g1=ctx.createGain(),g2=ctx.createGain(),g3=ctx.createGain(),gm=ctx.createGain();
  g1.gain.setValueAtTime(0,now);g1.gain.linearRampToValueAtTime(0.5,now+.006);
  g1.gain.exponentialRampToValueAtTime(.13,now+.3);g1.gain.exponentialRampToValueAtTime(.001,now+2);
  g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(0.18,now+.006);
  g2.gain.exponentialRampToValueAtTime(.03,now+.25);g2.gain.exponentialRampToValueAtTime(.001,now+1.3);
  g3.gain.setValueAtTime(0,now);g3.gain.linearRampToValueAtTime(.07,now+.006);
  g3.gain.exponentialRampToValueAtTime(.001,now+.5);
  gm.gain.setValueAtTime(0.65,now);
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.knee.value=10;comp.ratio.value=4;
  [o1,o2,o3].forEach((o,i)=>{o.connect([g1,g2,g3][i]);[g1,g2,g3][i].connect(gm);});
  gm.connect(comp);comp.connect(ctx.destination);
  o1.start(now);o1.stop(now+2);o2.start(now);o2.stop(now+1.3);o3.start(now);o3.stop(now+.5);
}

// ══════════════════════════════════════════════════════
//  NOTE BADGE
// ══════════════════════════════════════════════════════
const badge = document.getElementById('badge');
let bt;
function showNote(n,c){
  badge.textContent=n;badge.style.color=c;
  badge.style.borderColor=c;
  badge.style.boxShadow=`0 0 22px ${c}88,inset 0 0 12px ${c}22`;
  badge.style.textShadow=`0 0 16px ${c}`;
  badge.style.background=c+'18';
  badge.classList.remove('show');void badge.offsetWidth;badge.classList.add('show');
  clearTimeout(bt);bt=setTimeout(()=>badge.classList.remove('show'),900);
}

// ══════════════════════════════════════════════════════
//  TRIGGER / RELEASE
// ══════════════════════════════════════════════════════
const active = new Set();

function trigger(letter){
  const e=keyMap[letter];if(!e||active.has(letter))return;
  active.add(letter);
  const{el,f,n,c,type}=e;
  el.classList.add('active');
  if(type==='white'){
    el.style.background=`linear-gradient(180deg,${c}cc,${c}88 55%,${c}44)`;
    el.style.boxShadow=`inset 0 2px 5px rgba(0,0,0,.2),0 0 28px ${c}99,0 0 60px ${c}44`;
  } else {
    el.style.background=`linear-gradient(180deg,${c}ee,${c}aa 65%,${c}66)`;
    el.style.boxShadow=`inset 0 2px 4px rgba(0,0,0,.4),0 0 22px ${c}bb,0 0 50px ${c}55`;
  }
  el.querySelector('.kb').style.color='rgba(5,0,20,0.85)';
  el.querySelector('.nn').style.color='rgba(5,0,20,0.6)';
  playNote(f);
  showNote(n,c);
  const rect=el.getBoundingClientRect();
  spawnFX(rect.left+rect.width/2, rect.top+rect.height*.28, c, letter);
}

function release(letter){
  const e=keyMap[letter];if(!e)return;
  active.delete(letter);
  const{el}=e;
  el.classList.remove('active');
  el.style.background='';el.style.boxShadow='';
  el.querySelectorAll('span').forEach(s=>s.style.color='');
}

// ══════════════════════════════════════════════════════
//  KEYBOARD EVENTS
// ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{if(!e.repeat)trigger(e.key.toUpperCase());});
document.addEventListener('keyup',  e=>release(e.key.toUpperCase()));

// ══════════════════════════════════════════════════════
//  MULTI-TOUCH SUPPORT
//  Map touch identifiers → key letters for proper multi-touch
// ══════════════════════════════════════════════════════
const touchMap = {}; // touchId → letter

document.addEventListener('touchstart', e=>{
  [...e.changedTouches].forEach(t=>{
    const el = document.elementFromPoint(t.clientX,t.clientY);
    if(el){
      const key = el.closest('[data-key]');
      if(key){
        const lt = key.dataset.key;
        touchMap[t.identifier] = lt;
        trigger(lt);
      }
    }
  });
},{passive:false});

document.addEventListener('touchend', e=>{
  [...e.changedTouches].forEach(t=>{
    const lt = touchMap[t.identifier];
    if(lt){ release(lt); delete touchMap[t.identifier]; }
  });
},{passive:false});

document.addEventListener('touchcancel', e=>{
  [...e.changedTouches].forEach(t=>{
    const lt = touchMap[t.identifier];
    if(lt){ release(lt); delete touchMap[t.identifier]; }
  });
},{passive:false});
</script>
